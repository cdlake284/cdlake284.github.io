<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>더월드 알피지 조합 도우미</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:1000px;
    margin:auto;
    padding:20px;
    background:#f5f5f5;
}
h1{text-align:center;}
input{
    width:100%;
    padding:12px;
    font-size:18px;
    border:1px solid #ccc;
    border-radius:8px;
}
.item{
    background:white;
    border:1px solid #ddd;
    border-radius:10px;
    padding:18px;
    margin-top:12px;
}
.badge{
    display:inline-block;
    background:#eee;
    padding:6px 10px;
    margin:4px;
    border-radius:6px;
    cursor:pointer;
}
.badge:hover{background:#dcdcdc;}
.section{
    margin-top:16px;
    padding-top:12px;
    border-top:1px solid #ddd;
}
.small{color:#666;font-size:14px;}
.drop{
    background:#fff7e6;
    border:1px solid #ffd591;
    padding:10px;
    border-radius:8px;
    margin-top:8px;
}
</style>
</head>

<body>

<h1>더월드 알피지 조합 도우미</h1>

<input id="search" placeholder="아이템 이름을 입력하세요...">

<div id="status" class="small">데이터 불러오는 중...</div>
<div id="results"></div>

<script>
let items = [];
let nameMap = {};

function displayName(name){
    const found = nameMap[name];
    return found ? (found.koreanname || found.name) : name;
}

function safeText(text){
    return String(text ?? "").replace(/'/g, "\\'");
}

function searchByName(name){
    document.getElementById("search").value = displayName(name);
    render(displayName(name));
}

function recipeHtml(recipe){
    if(!Array.isArray(recipe) || recipe.length === 0){
        return "<p class='small'>확인된 재료 정보가 없습니다.</p>";
    }

    return recipe.map(obj => {
        const materialName = Object.keys(obj)[0];
        const count = obj[materialName];

        return `
            <span class="badge" onclick="searchByName('${safeText(materialName)}')">
                ${displayName(materialName)} x${count}
            </span>
        `;
    }).join("");
}

function notesHtml(notes){
    if(!Array.isArray(notes) || notes.length === 0){
        return "-";
    }

    return notes.map(note => {
        return String(note).replace("Where to obtain:", "획득처:");
    }).join("<br>");
}

function droppedByHtml(item){
    const droppedBy = item.dropped_by || [];
    const rate = item.droprate;

    if(!Array.isArray(droppedBy) || droppedBy.length === 0){
        return "<p class='small'>드랍 몬스터 정보가 없습니다.</p>";
    }

    const rateText =
        typeof rate === "number"
        ? Math.round(rate * 10000) / 100 + "%"
        : "-";

    return `
        <div class="drop">
            <strong>드랍 몬스터:</strong><br>
            ${droppedBy.map(monster => `• ${monster}`).join("<br>")}
            <br><br>
            <strong>드랍률:</strong> ${rateText}
        </div>
    `;
}

fetch("Module_Item_data.json")
.then(res => res.json())
.then(data => {
    items = data;

    items.forEach(item => {
        if(item.name) nameMap[item.name] = item;
        if(item.koreanname) nameMap[item.koreanname] = item;
        if(item.id) nameMap[item.id] = item;
    });

    document.getElementById("status").innerText =
        "아이템 데이터 로드 완료: " + items.length + "개";
})
.catch(err => {
    document.getElementById("status").innerText =
        "JSON 파일을 불러오지 못했습니다.";
    console.error(err);
});

document.getElementById("search").addEventListener("input", function(){
    render(this.value.trim());
});

function render(keyword){
    const box = document.getElementById("results");

    if(!keyword){
        box.innerHTML = "";
        return;
    }

    const lower = keyword.toLowerCase();

    const results = items.filter(item =>
        (item.koreanname || "").toLowerCase().includes(lower) ||
        (item.name || "").toLowerCase().includes(lower)
    ).slice(0, 30);

    if(results.length === 0){
        box.innerHTML = "<p>검색 결과가 없습니다.</p>";
        return;
    }

    box.innerHTML = results.map(item => {
        const usedFor = item.required_by || [];

        return `
        <div class="item">
            <h2>${item.koreanname || item.name}</h2>

            <p><strong>영문명:</strong> ${item.name || "-"}</p>
            <p><strong>종류:</strong> ${item.type || "-"}</p>
            <p><strong>등급:</strong> ${item.rank || "-"}</p>
            <p><strong>설명:</strong> ${item.description || "-"}</p>

            <div class="section">
                <h3>획득 정보</h3>
                <p>${notesHtml(item.notes)}</p>
                ${droppedByHtml(item)}
            </div>

            <div class="section">
                <h3>이 아이템의 재료</h3>
                ${recipeHtml(item.recipe)}
            </div>

            <div class="section">
                <h3>이 아이템이 사용되는 조합</h3>
                ${
                    usedFor.length
                    ? usedFor.map(name =>
                        `<span class="badge" onclick="searchByName('${safeText(name)}')">
                            ${displayName(name)}
                        </span>`
                      ).join("")
                    : "<p class='small'>사용처 정보가 없습니다.</p>"
                }
            </div>
        </div>
        `;
    }).join("");
}
</script>

</body>
</html>
