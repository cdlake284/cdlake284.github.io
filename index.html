<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>광윤이와 함께하는 더월드 세상</title>

<style>
body{font-family:Arial,sans-serif;max-width:1600px;margin:auto;padding:20px;background:#f5f5f5;}
h1{text-align:center;}
input{width:100%;padding:12px;font-size:18px;border:1px solid #ccc;border-radius:8px;box-sizing:border-box;}
button{cursor:pointer;border:none;border-radius:6px;padding:7px 10px;margin:4px;}

.tab-wrap{display:flex;gap:8px;margin:15px 0;}
.tab-btn{flex:1;background:#e5e7eb;font-weight:bold;font-size:30px;padding:12px;}
.tab-btn.active{background:#2563eb;color:white;}
.tab-content{display:none;}
.tab-content.active{display:block;}

.add-btn{background:#2563eb;color:white;}
.clear-btn{background:#555;color:white;}
.reset-btn{background:#dc2626;color:white;}

.item,.planner,.side-panel{background:white;border:1px solid #ddd;border-radius:10px;padding:18px;margin-top:12px;}
.section{margin-top:16px;padding-top:12px;border-top:1px solid #ddd;}
.small{color:#666;font-size:14px;}

.farm-layout{
    display:grid;
    grid-template-columns:minmax(0,1fr) 420px;
    gap:16px;
    align-items:start;
}

.side-panel{
    position:sticky;
    top:20px;
}

.badge{display:inline-block;background:#eee;padding:6px 10px;margin:4px;border-radius:6px;cursor:pointer;}
.badge:hover{background:#dcdcdc;}

.kind{display:inline-block;padding:3px 8px;border-radius:999px;font-size:12px;font-weight:bold;margin-left:6px;white-space:nowrap;}
.craft{background:#e0f2fe;color:#0369a1;}
.dropitem{background:#fef3c7;color:#92400e;}
.shop{background:#dcfce7;color:#166534;}
.done{background:#bbf7d0;color:#166534;}
.missing{background:#fee2e2;color:#b91c1c;}

.item-icon{
    width:48px;
    height:48px;
    object-fit:cover;
    border-radius:4px;
    border:1px solid #555;
    margin-right:8px;
    vertical-align:middle;
    flex-shrink:0;
    background:#111;
}

.item-icon-small{
    width:26px;
    height:26px;
    object-fit:cover;
    border-radius:4px;
    border:1px solid #555;
    margin-right:6px;
    vertical-align:middle;
    flex-shrink:0;
    background:#111;
}

.title-with-icon{
    display:inline-flex;
    align-items:center;
    gap:4px;
}

.owned-toggle{background:#e5e7eb;color:#374151;font-weight:bold;}
.owned-toggle.active{background:#22c55e;color:white;}

.target-row{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.target-chip{display:inline-flex;align-items:center;gap:6px;padding:6px 10px;margin:3px;}
.target-chip span{cursor:default;}
.target-chip button{background:#ef4444;color:white;padding:2px 6px;margin:0;font-size:12px;}

.total-card,.material-card,.craft-card,.target-detail-card{
    background:#f8f8f8;
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
    margin:8px 0;
}

.total-card{
    background:white;
    border:2px solid #d1d5db;
}

.done-card{background:#ecfdf5;border-color:#86efac;}

.monster-title{
    font-size:21px;
    font-weight:700;
    color:#374151;
    margin-bottom:10px;
}

.total-title,.material-title,.craft-title,.target-detail-title{font-weight:bold;cursor:pointer;}
.total-title:hover,.material-title:hover,.craft-title:hover,.target-detail-title:hover{text-decoration:underline;}

.material-drop{margin-top:6px;color:#444;font-size:14px;}

.item-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:8px;
    margin-top:8px;
}

.grid-card{
    background:#f8f8f8;
    border:1px solid #ddd;
    border-radius:8px;
    padding:10px;
}

.grid-card.done-card{background:#ecfdf5;border-color:#86efac;}

.row-card{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    flex-wrap:wrap;
}

.item-main{
    display:flex;
    align-items:center;
    gap:6px;
    flex-wrap:wrap;
    min-width:260px;
}

.item-controls{
    display:flex;
    align-items:center;
    gap:8px;
    flex-wrap:nowrap;
    margin-left:auto;
}

.qty-btn{background:#e5e7eb;font-weight:bold;padding:4px 9px;}
.qty-num{font-weight:bold;min-width:20px;text-align:center;}
.remain{font-weight:bold;white-space:nowrap;}
.remain.need{color:#dc2626;}
.remain.done-text{color:#16a34a;}

.craft-card{
    display:grid;
    grid-template-columns:1.6fr 1fr;
    gap:10px;
    align-items:center;
}

.craft-left{min-width:0;}
.craft-material-list{
    display:flex;
    flex-wrap:wrap;
    gap:6px;
    justify-content:flex-start;
}

.simple-material{
    display:inline-flex;
    align-items:center;
    background:#f1f5f9;
    border:1px solid #e2e8f0;
    border-radius:999px;
    padding:5px 9px;
    font-size:13px;
    cursor:pointer;
    white-space:nowrap;
}

.simple-material:hover{background:#e2e8f0;}

.simple-material.done-card{
    background:#ecfdf5;
    border-color:#86efac;
    color:#166534;
    font-weight:bold;
}

.detail-material-list{
    margin-top:8px;
    display:flex;
    flex-direction:column;
    gap:6px;
}

.detail-material{
    background:white;
    border:1px solid #e5e7eb;
    border-radius:8px;
    padding:8px;
    cursor:pointer;
}

.detail-material.done-card{
    background:#ecfdf5;
    border-color:#86efac;
}

.detail-material-name{
    font-weight:bold;
    cursor:pointer;
}

.detail-material-name:hover{text-decoration:underline;}

.progress-wrap{background:#e5e7eb;border-radius:999px;height:14px;margin:8px 0 16px 0;overflow:hidden;}
.progress-bar{height:100%;background:#22c55e;width:0%;}

@media(max-width:1100px){
    .farm-layout{grid-template-columns:1fr;}
    .side-panel{position:static;}
}

@media(max-width:700px){
    .item-grid{grid-template-columns:1fr;}
    .craft-card{grid-template-columns:1fr;}
    .row-card{align-items:flex-start;}
    .item-controls{margin-left:0;flex-wrap:wrap;}
}
</style>
</head>

<body>

<h1>광윤이와 함께하는 더월드 세상</h1>

<div class="tab-wrap">
    <button class="tab-btn active" onclick="showTab('itemTab')">아이템 정보</button>
    <button class="tab-btn" onclick="showTab('farmTab')">파밍 가이드</button>
</div>

<div id="status" class="small">데이터 불러오는 중...</div>

<div id="itemTab" class="tab-content active">
    <div class="planner">
        <h3>아이템 검색</h3>
        <input id="search" placeholder="아이템 이름 입력... 예: 화신의 눈, 스캐럽 본">
    </div>

    <div class="planner">
        <h3>현재 목표 아이템</h3>
        <div id="targetListMini" class="target-row small">아직 추가된 목표 아이템이 없습니다.</div>
    </div>

    <div id="results"></div>
</div>

<div id="farmTab" class="tab-content">
    <div class="farm-layout">
        <div class="planner">
            <h2>목표 아이템 목록</h2>
            <div id="targetList" class="target-row small">아직 추가된 목표 아이템이 없습니다.</div>
            <button class="clear-btn" onclick="clearTargets()">목록 전체 삭제</button>
            <button class="reset-btn" onclick="clearInventory()">보유 수량 초기화</button>

            <div class="section">
                <h2>파밍 진행도</h2>
                <div id="progressArea"></div>
            </div>

            <div class="section">
                <h2>조합 필요 아이템</h2>
                <div id="craftMaterials" class="small">조합 아이템이 있으면 여기에 표시됩니다.</div>
            </div>

            <div class="section">
                <h2>직접 파밍 필요 재료</h2>
                <div id="totalMaterials" class="small">목표 아이템을 추가하면 여기에 총합이 표시됩니다.</div>
            </div>
        </div>

        <div class="side-panel">
            <h2>목표 아이템 상세</h2>
            <div id="targetDetails" class="small">목표 아이템을 추가하면 여기에 상세 재료가 표시됩니다.</div>
        </div>
    </div>
</div>

let nameMap = {};
let targets = JSON.parse(localStorage.getItem("targets") || "[]");
let inventory = JSON.parse(localStorage.getItem("inventory") || "{}");

function saveTargets(){localStorage.setItem("targets", JSON.stringify(targets));}
function saveInventory(){localStorage.setItem("inventory", JSON.stringify(inventory));}

function showTab(tabId){
    document.querySelectorAll(".tab-content").forEach(tab => tab.classList.remove("active"));
    document.querySelectorAll(".tab-btn").forEach(btn => btn.classList.remove("active"));
    document.getElementById(tabId).classList.add("active");
    document.querySelectorAll(".tab-btn")[tabId === "itemTab" ? 0 : 1].classList.add("active");
}

function displayName(name){
    const found = nameMap[name];
    return found ? (found.koreanname || found.name) : name;
}

function displayMonsterName(name){
    return monsterNameMap[name] || name;
}

function getItemIcon(itemName){
    if(!itemName) return "";
    return `images/items/${itemName.replaceAll(" ", "_")}.jpg`;
}

function itemIcon(itemName, small=false){
    if(!itemName) return "";
    return `
        <img
            class="${small ? "item-icon-small" : "item-icon"}"
            src="${getItemIcon(itemName)}"
            onerror="this.style.display='none'"
        >
    `;
}

function safeText(text){
    return String(text ?? "").replace(/\\/g, "\\\\").replace(/'/g, "\\'");
}

function searchByName(name){
    showTab("itemTab");
    document.getElementById("search").value = displayName(name);
    render(displayName(name));
}

function hasDropInfo(item){
    return item && Array.isArray(item.dropped_by) && item.dropped_by.length > 0;
}

function isCraftItem(item){
    if(!item) return false;
    if(hasDropInfo(item)) return false;
    return Array.isArray(item.recipe) && item.recipe.length > 0;
}

function isCoinName(name){
    const n = String(name || "").toLowerCase();
    return n.startsWith("prius") && n.includes("coin");
}

function shopRecipeText(item){
    if(!item || !Array.isArray(item.recipe)) return "";

    const shopMaterials = item.recipe.filter(obj => {
        const materialName = Object.keys(obj)[0];
        return isCoinName(materialName);
    });

    if(shopMaterials.length === 0) return "";

    return shopMaterials.map(obj => {
        const materialName = Object.keys(obj)[0];
        const count = obj[materialName];
        return `${displayName(materialName)} x${count}`;
    }).join(", ");
}

function itemKindBadge(item){
    if(isCraftItem(item)) return `<span class="kind craft">조합 아이템</span>`;
    return `<span class="kind dropitem">드랍 아이템</span>`;
}

function shopBadge(item){
    const text = shopRecipeText(item);
    return text ? `<span class="kind shop">구매 가능: ${text}</span>` : "";
}

function doneBadge(){return `<span class="kind done">완료</span>`;}
function missingBadge(){return `<span class="kind missing">미보유</span>`;}

function droppedByText(item){
    if(!item || !Array.isArray(item.dropped_by) || item.dropped_by.length === 0) return "-";
    return item.dropped_by.map(displayMonsterName).join(", ");
}

function materialDropInfo(materialName){
    const material = nameMap[materialName];

    if(!material) return "<div class='material-drop'>정보 없음</div>";
    if(isCraftItem(material)) return "<div class='material-drop'>획득 방식: 조합</div>";

    return `
        <div class="material-drop">
            <strong>드랍 몬스터:</strong> ${droppedByText(material)}
        </div>
    `;
}

function recipeHtml(recipe){
    if(!Array.isArray(recipe) || recipe.length === 0){
        return "<p class='small'>조합 재료가 없습니다.</p>";
    }

    return recipe.map(obj => {
        const materialName = Object.keys(obj)[0];
        const count = obj[materialName];
        const material = nameMap[materialName];

        return `
            <div class="material-card">
                <div class="material-title" onclick="searchByName('${safeText(materialName)}')">
                    <span class="title-with-icon">
                        ${itemIcon(materialName, true)}
                        ${displayName(materialName)} x${count}
                    </span>
                    ${itemKindBadge(material)}
                    ${shopBadge(material)}
                </div>
                ${materialDropInfo(materialName)}
            </div>
        `;
    }).join("");
}

function addTarget(itemName){
    if(!targets.includes(itemName)){
        targets.push(itemName);
        saveTargets();
        updatePlanner();
    }
}

function removeTarget(itemName){
    targets = targets.filter(name => name !== itemName);
    saveTargets();
    updatePlanner();
}

function clearTargets(){
    targets = [];
    saveTargets();
    updatePlanner();
}

function clearInventory(){
    if(confirm("현재 보유 수량을 전부 초기화할까요? 목표 아이템 목록은 유지됩니다.")){
        inventory = {};
        saveInventory();
        updatePlanner();
    }
}

function addTotal(totals, name, count){
    totals[name] = (totals[name] || 0) + count;
}

function addOwned(name){
    inventory[name] = (inventory[name] || 0) + 1;
    saveInventory();
    updatePlanner();
}

function removeOwned(name){
    inventory[name] = Math.max((inventory[name] || 0) - 1, 0);
    saveInventory();
    updatePlanner();
}

function toggleCraftOwned(name, needCount){
    const item = nameMap[name];
    const done = isCraftCompleteByMaterials(name, needCount);

    if(done){
        inventory[name] = 0;

        if(item && Array.isArray(item.recipe)){
            item.recipe.forEach(obj => {
                const materialName = Object.keys(obj)[0];
                inventory[materialName] = 0;
            });
        }
    }else{
        inventory[name] = needCount;

        if(item && Array.isArray(item.recipe)){
            item.recipe.forEach(obj => {
                const materialName = Object.keys(obj)[0];
                const count = obj[materialName] * needCount;
                inventory[materialName] = count;
            });
        }
    }

    saveInventory();
    updatePlanner();
}
function toggleCraftMaterialOwned(name, needCount){
    const current = inventory[name] || 0;

    if(current >= needCount){
        inventory[name] = 0;
    }else{
        inventory[name] = needCount;
    }

    syncCraftOwnedState();

    saveInventory();
    updatePlanner();
}
function syncCraftOwnedState(){
    const {craftTotals} = getPlannerData();

    Object.keys(craftTotals).forEach(craftName => {
        const needCount = craftTotals[craftName];

        const completeByDirectMaterials = isCraftCompleteByDirectMaterialsOnly(craftName, needCount);

        if(completeByDirectMaterials){
            inventory[craftName] = needCount;
        }else{
            inventory[craftName] = 0;
        }
    });
}
    
function isCraftOwned(name, needCount){
    return (inventory[name] || 0) >= needCount;
}

function targetChipsHtml(){
    if(targets.length === 0) return "아직 추가된 목표 아이템이 없습니다.";

    return targets.map(name => `
        <div class="target-chip">
            ${itemIcon(name, true)}
            <span>${displayName(name)}</span>
            <button onclick="removeTarget('${safeText(name)}')">X</button>
        </div>
    `).join("");
}

function ownedControlHtml(name, needCount){
    const owned = inventory[name] || 0;
    const remain = Math.max(needCount - owned, 0);
    const done = remain === 0;

    return `
        <div class="item-controls">
            <span>필요 ${needCount}</span>
            <span>보유</span>
            <button class="qty-btn" onclick="removeOwned('${safeText(name)}')">-</button>
            <span class="qty-num">${owned}</span>
            <button class="qty-btn" onclick="addOwned('${safeText(name)}')">+</button>
            <span class="remain ${done ? "done-text" : "need"}">
                ${done ? "완료" : "남은 " + remain}
            </span>
        </div>
    `;
}

function craftOwnedControlHtml(name, needCount, done){
    return `
        <div class="item-controls">
            <button class="owned-toggle ${done ? "active" : ""}" onclick="toggleCraftOwned('${safeText(name)}', ${needCount})">
                ${done ? "보유중" : "미보유"}
            </button>
            <span class="remain ${done ? "done-text" : "need"}">
                ${done ? "완료" : "미완료"}
            </span>
        </div>
    `;
}

function collectLeafMaterials(itemName, multiplier, totals){
    const item = nameMap[itemName];

    if(!item){
        addTotal(totals, itemName, multiplier);
        return;
    }

    if(isCraftItem(item) && Array.isArray(item.recipe)){
        item.recipe.forEach(obj => {
            const materialName = Object.keys(obj)[0];
            const count = obj[materialName] * multiplier;
            const material = nameMap[materialName];

            if(isCraftItem(material)){
                collectLeafMaterials(materialName, count, totals);
            }else{
                addTotal(totals, materialName, count);
            }
        });
    }else{
        addTotal(totals, item.name || itemName, multiplier);
    }
}

function isCraftCompleteByMaterials(craftName, needCount){
    if(isCraftOwned(craftName, needCount)) return true;

    const item = nameMap[craftName];
    if(!item || !Array.isArray(item.recipe)) return false;

    const requiredLeaves = {};
    collectLeafMaterials(craftName, needCount, requiredLeaves);

    return Object.keys(requiredLeaves).every(name => {
        return (inventory[name] || 0) >= requiredLeaves[name];
    });
}

function isCraftCompleteByDirectMaterialsOnly(craftName, needCount){
    const item = nameMap[craftName];
    if(!item || !Array.isArray(item.recipe)) return false;

    return item.recipe.every(obj => {
        const materialName = Object.keys(obj)[0];
        const count = obj[materialName] * needCount;

        return (inventory[materialName] || 0) >= count;
    });
}    
    
function isMaterialComplete(materialName, needCount){
    const material = nameMap[materialName];

    if(isCraftItem(material)){
        if(isCraftOwned(materialName, needCount)) return true;
        return isCraftCompleteByMaterials(materialName, needCount);
    }

    return (inventory[materialName] || 0) >= needCount;
}

function handleMaterialForPlanner(materialName, count, directTotals, craftTotals){
    const material = nameMap[materialName];

    if(isCraftItem(material)){
        addTotal(craftTotals, materialName, count);

        if(!isCraftOwned(materialName, count)){
            collectLeafMaterials(materialName, count, directTotals);
        }
    }else{
        addTotal(directTotals, materialName, count);
    }
}

function getPlannerData(){
    const directTotals = {};
    const craftTotals = {};

    targets.forEach(targetName => {
        const item = nameMap[targetName];
        if(!item) return;

        if(isCraftItem(item)){
            if(isCraftOwned(targetName, 1)) return;

            if(Array.isArray(item.recipe)){
                item.recipe.forEach(obj => {
                    const materialName = Object.keys(obj)[0];
                    const count = obj[materialName];
                    handleMaterialForPlanner(materialName, count, directTotals, craftTotals);
                });
            }
        }else{
            addTotal(directTotals, item.name, 1);
        }
    });

    return {directTotals, craftTotals};
}

function isTargetComplete(targetName){
    const item = nameMap[targetName];

    if(!item) return false;

    if(isCraftItem(item) && isCraftOwned(targetName, 1)){
        return true;
    }

    if(!isCraftItem(item)){
        return (inventory[item.name] || 0) >= 1;
    }

    if(!Array.isArray(item.recipe) || item.recipe.length === 0) return false;

    return item.recipe.every(obj => {
        const materialName = Object.keys(obj)[0];
        const count = obj[materialName];
        return isMaterialComplete(materialName, count);
    });
}

function craftSimpleMaterialsHtml(craftName, needCount){
    const item = nameMap[craftName];

    if(!item || !Array.isArray(item.recipe) || item.recipe.length === 0){
        return "<span class='small'>재료 정보 없음</span>";
    }

    return `
        <div class="craft-material-list">
            ${item.recipe.map(obj => {
                const materialName = Object.keys(obj)[0];
                const count = obj[materialName] * needCount;
                const done = isMaterialComplete(materialName, count);

                return `
                    <span class="simple-material ${done ? "done-card" : ""}" onclick="toggleCraftMaterialOwned('${safeText(materialName)}', ${count})">
                        ${itemIcon(materialName, true)}
                        ${displayName(materialName)} x${count}
                    </span>
                `;
            }).join("")}
        </div>
    `;
}

function progressHtml(directTotals){
    const names = Object.keys(directTotals);

    if(names.length === 0){
        return `
            <div class="small"><strong>전체 진행도:</strong> 0 / 0 (100%)</div>
            <div class="progress-wrap">
                <div class="progress-bar" style="width:100%"></div>
            </div>
        `;
    }

    let needTotal = 0;
    let ownedTotal = 0;

    names.forEach(name => {
        needTotal += directTotals[name];
        ownedTotal += Math.min(inventory[name] || 0, directTotals[name]);
    });

    const percent = needTotal > 0 ? Math.round((ownedTotal / needTotal) * 100) : 100;

    return `
        <div class="small"><strong>전체 진행도:</strong> ${ownedTotal} / ${needTotal} (${percent}%)</div>
        <div class="progress-wrap">
            <div class="progress-bar" style="width:${percent}%"></div>
        </div>
    `;
}

function craftMaterialsHtml(craftTotals){
    const names = Object.keys(craftTotals);

    if(names.length === 0){
        return "조합 필요 아이템이 없습니다.";
    }

    return names.map(name => {
        const item = nameMap[name];
        const needCount = craftTotals[name];
        const done = isCraftCompleteByMaterials(name, needCount);

        return `
            <div class="craft-card ${done ? "done-card" : ""}">
                <div class="craft-left">
                    <div class="row-card">
                        <div class="item-main">
                            <span class="craft-title" onclick="searchByName('${safeText(name)}')">
                                <span class="title-with-icon">
                                    ${itemIcon(name)}
                                    ${displayName(name)} x${needCount}
                                </span>
                            </span>
                            ${itemKindBadge(item)}
                            ${done ? doneBadge() : ""}
                        </div>
                        ${craftOwnedControlHtml(name, needCount, done)}
                    </div>
                </div>

                <div>
                    ${craftSimpleMaterialsHtml(name, needCount)}
                </div>
            </div>
        `;
    }).join("");
}

function directMaterialsHtml(directTotals){
    const monsterGroups = {};

    Object.keys(directTotals).forEach(name => {
        const material = nameMap[name];
        const count = directTotals[name];

        const monsters = hasDropInfo(material)
            ? material.dropped_by.map(displayMonsterName)
            : ["드랍 몬스터 정보 없음"];

        const monsterKey = monsters.join(", ");

        if(!monsterGroups[monsterKey]){
            monsterGroups[monsterKey] = [];
        }

        monsterGroups[monsterKey].push({name, count});
    });

    const monsterNames = Object.keys(monsterGroups);

    if(monsterNames.length === 0){
        return "직접 파밍 필요 재료가 없습니다.";
    }

    return `
        <h3>몬스터별 파밍 리스트</h3>
        ${monsterNames.map(monster => `
            <div class="total-card">
                <div class="monster-title">${monster}</div>
                <div class="item-grid">
                    ${monsterGroups[monster].map(entry => {
                        const material = nameMap[entry.name];
                        const owned = inventory[entry.name] || 0;
                        const remain = Math.max(entry.count - owned, 0);

                        return `
                            <div class="grid-card ${remain === 0 ? "done-card" : ""}">
                                <div class="row-card">
                                    <div class="item-main">
                                        <span class="total-title" onclick="searchByName('${safeText(entry.name)}')">
                                            <span class="title-with-icon">
                                                ${itemIcon(entry.name)}
                                                ${displayName(entry.name)} x${entry.count}
                                            </span>
                                        </span>
                                        ${itemKindBadge(material)}
                                        ${shopBadge(material)}
                                        ${remain === 0 ? doneBadge() : ""}
                                    </div>
                                    ${ownedControlHtml(entry.name, entry.count)}
                                </div>
                            </div>
                        `;
                    }).join("")}
                </div>
            </div>
        `).join("")}
    `;
}

function targetDetailsHtml(){
    if(targets.length === 0){
        return "목표 아이템을 추가하면 여기에 상세 재료가 표시됩니다.";
    }

    return targets.map(targetName => {
        const item = nameMap[targetName];
        if(!item) return "";

        const targetDone = isTargetComplete(targetName);

        let materialList = "";

        if(isCraftItem(item) && Array.isArray(item.recipe) && item.recipe.length > 0){
            materialList = `
                <div class="detail-material-list">
                    ${item.recipe.map(obj => {
                        const materialName = Object.keys(obj)[0];
                        const count = obj[materialName];
                        const material = nameMap[materialName];
                        const done = isMaterialComplete(materialName, count);
                        const owned = inventory[materialName] || 0;

                        let statusText = "";
                        if(isCraftItem(material)){
                            if(isCraftOwned(materialName, count)){
                                statusText = "보유";
                            }else if(done){
                                statusText = "재료 충족";
                            }else{
                                statusText = "미보유";
                            }
                        }else{
                            statusText = `${Math.min(owned, count)} / ${count}`;
                        }

                        return `
                            <div class="detail-material ${done ? "done-card" : ""}" onclick="${isCraftItem(material) ? `toggleCraftOwned('${safeText(materialName)}', ${count})` : `toggleCraftMaterialOwned('${safeText(materialName)}', ${count})`}">
                                <div>
                                    <span class="detail-material-name">
                                        <span class="title-with-icon">
                                            ${itemIcon(materialName, true)}
                                            ${displayName(materialName)} x${count}
                                        </span>
                                    </span>
                                    ${itemKindBadge(material)}
                                    ${shopBadge(material)}
                                    ${done ? doneBadge() : missingBadge()}
                                </div>
                                <div class="small">상태: ${statusText}</div>
                            </div>
                        `;
                    }).join("")}
                </div>
            `;
        }else{
            const owned = inventory[item.name] || 0;
            materialList = `
                <div class="detail-material-list">
                    <div class="detail-material ${owned >= 1 ? "done-card" : ""}" onclick="toggleCraftMaterialOwned('${safeText(item.name)}', 1)">
                        <div>
                            <span class="detail-material-name">
                                <span class="title-with-icon">
                                    ${itemIcon(item.name, true)}
                                    ${displayName(item.name)} x1
                                </span>
                            </span>
                            ${itemKindBadge(item)}
                            ${shopBadge(item)}
                            ${owned >= 1 ? doneBadge() : missingBadge()}
                        </div>
                        <div class="small">상태: ${Math.min(owned, 1)} / 1</div>
                    </div>
                </div>
            `;
        }

        return `
            <div class="target-detail-card ${targetDone ? "done-card" : ""}">
                <div>
                    <span class="target-detail-title" onclick="searchByName('${safeText(targetName)}')">
                        <span class="title-with-icon">
                            ${itemIcon(targetName)}
                            ${displayName(targetName)}
                        </span>
                    </span>
                    ${itemKindBadge(item)}
                    ${targetDone ? doneBadge() : missingBadge()}
                </div>
                <div class="small" style="margin-top:6px;">
                    ${targetDone ? "현재 재료 기준으로 제작 가능" : "아직 필요한 재료가 남아있음"}
                </div>
                ${materialList}
            </div>
        `;
    }).join("");
}

function updatePlanner(){
    const targetBox = document.getElementById("targetList");
    const miniTargetBox = document.getElementById("targetListMini");
    const totalBox = document.getElementById("totalMaterials");
    const craftBox = document.getElementById("craftMaterials");
    const progressArea = document.getElementById("progressArea");
    const targetDetailsBox = document.getElementById("targetDetails");

    if(targetBox) targetBox.innerHTML = targetChipsHtml();
    if(miniTargetBox) miniTargetBox.innerHTML = targetChipsHtml();
    if(targetDetailsBox) targetDetailsBox.innerHTML = targetDetailsHtml();

    if(targets.length === 0){
        totalBox.innerHTML = "목표 아이템을 추가하면 여기에 총합이 표시됩니다.";
        craftBox.innerHTML = "조합 아이템이 있으면 여기에 표시됩니다.";
        progressArea.innerHTML = "";
        return;
    }

    const {directTotals, craftTotals} = getPlannerData();

    progressArea.innerHTML = progressHtml(directTotals);
    craftBox.innerHTML = craftMaterialsHtml(craftTotals);
    totalBox.innerHTML = directMaterialsHtml(directTotals);
}

fetch("Module_Item_data.json")
.then(res => res.json())
.then(data => {
    items = data;

    items.forEach(item => {
        if(item.name) nameMap[item.name] = item;
        if(item.koreanname) nameMap[item.koreanname] = item;
        if(item.id) nameMap[item.id] = item;
    });

    document.getElementById("status").innerText =
        "아이템 데이터 로드 완료: " + items.length + "개";

    updatePlanner();
})
.catch(err => {
    document.getElementById("status").innerText =
        "JSON 파일을 불러오지 못했습니다.";
    console.error(err);
});

document.getElementById("search").addEventListener("input", function(){
    render(this.value.trim());
});

function render(keyword){
    const box = document.getElementById("results");

    if(!keyword){
        box.innerHTML = "";
        return;
    }

    const lower = keyword.toLowerCase();

    const results = items.filter(item =>
        (item.koreanname || "").toLowerCase().includes(lower) ||
        (item.name || "").toLowerCase().includes(lower)
    ).slice(0, 30);

    if(results.length === 0){
        box.innerHTML = "<p>검색 결과가 없습니다.</p>";
        return;
    }

    box.innerHTML = results.map(item => {
        const usedFor = item.required_by || [];

        return `
        <div class="item">
            <h2>
                <span class="title-with-icon">
                    ${itemIcon(item.name)}
                    ${item.koreanname || item.name}
                </span>
                ${itemKindBadge(item)}
                ${shopBadge(item)}
            </h2>

            <button class="add-btn" onclick="addTarget('${safeText(item.name)}')">
                목표에 추가
            </button>

            <p><strong>영문명:</strong> ${item.name || "-"}</p>
            <p><strong>종류:</strong> ${item.type || "-"}</p>
            <p><strong>등급:</strong> ${item.rank || "-"}</p>
            <p><strong>설명:</strong> ${item.description || "-"}</p>

            ${!isCraftItem(item) ? `<p><strong>드랍 몬스터:</strong> ${droppedByText(item)}</p>` : ""}

            <div class="section">
                <h3>이 아이템의 재료</h3>
                ${recipeHtml(item.recipe)}
            </div>

            <div class="section">
                <h3>이 아이템이 사용되는 조합</h3>
                ${
                    usedFor.length
                    ? usedFor.map(name =>
                        `<span class="badge" onclick="searchByName('${safeText(name)}')">
                            ${displayName(name)}
                        </span>`
                      ).join("")
                    : "<p class='small'>사용처 정보가 없습니다.</p>"
                }
            </div>
        </div>
        `;
    }).join("");
}
</script>
